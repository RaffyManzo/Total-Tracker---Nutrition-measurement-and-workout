name: OpenNutrition static index

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy the validated output to Cloudflare Pages
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: opennutrition-static-index-${{ github.ref }}
  cancel-in-progress: false

env:
  DATASET_VERSION: "2025.1"
  DATASET_URL: https://downloads.opennutrition.app/opennutrition-dataset-2025.1.zip
  DATASET_SHA256: 30420802bbf0e29852c282e37a58c7e18ebc1b57e109706925ef969f0498ff47
  TOOL_DIR: tool/opennutrition_static_index
  WORK_DIR: build/opennutrition-work
  PUBLIC_DIR: build/opennutrition-static-index

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: 3.12.2

      - name: Install locked tooling dependencies
        working-directory: ${{ env.TOOL_DIR }}
        run: dart pub get --enforce-lockfile

      - name: Verify tooling syntax and analysis
        working-directory: ${{ env.TOOL_DIR }}
        run: |
          set -euo pipefail
          python3 -m py_compile safe_extract.py validate_gate.py
          dart format --output=none --set-exit-if-changed .
          dart analyze .

      - name: Download pinned OpenNutrition archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$WORK_DIR"
          curl \
            --fail \
            --location \
            --proto '=https' \
            --tlsv1.2 \
            --retry 5 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 900 \
            --output "$WORK_DIR/opennutrition.zip" \
            "$DATASET_URL"
          printf '%s  %s\n' \
            "$DATASET_SHA256" \
            "$WORK_DIR/opennutrition.zip" \
            | sha256sum --check --strict

      - name: Safely extract allowlisted dataset files
        run: |
          set -euo pipefail
          python3 "$TOOL_DIR/safe_extract.py" \
            --archive "$WORK_DIR/opennutrition.zip" \
            --out "$WORK_DIR/extracted"

      - name: Build normalized intermediate index
        working-directory: ${{ env.TOOL_DIR }}
        run: |
          set -euo pipefail
          dart run build_stage1_index.dart \
            --tsv "$GITHUB_WORKSPACE/$WORK_DIR/extracted/opennutrition_foods.tsv" \
            --out "$GITHUB_WORKSPACE/$WORK_DIR/stage1" \
            --dataset-version "$DATASET_VERSION"

      - name: Build production static index
        working-directory: ${{ env.TOOL_DIR }}
        run: |
          set -euo pipefail
          dart run build_static_index.dart \
            --source "$GITHUB_WORKSPACE/$WORK_DIR/stage1" \
            --out "$GITHUB_WORKSPACE/$PUBLIC_DIR"

      - name: Run semantic and integrity gate
        working-directory: ${{ env.TOOL_DIR }}
        run: |
          set -euo pipefail
          dart run semantic_gate.dart \
            --index "$GITHUB_WORKSPACE/$PUBLIC_DIR" \
            --out "$GITHUB_WORKSPACE/$WORK_DIR/semantic-gate"
          python3 validate_gate.py \
            --summary "$GITHUB_WORKSPACE/$WORK_DIR/semantic-gate/semantic_gate_v5_summary.json" \
            --minimum-top1 48 \
            --minimum-top5 49 \
            --expected-count 50 \
            --expected-dataset-version "$DATASET_VERSION" \
            --expected-schema-version 3 \
            --minimum-records 300000

      - name: Copy public licensing and audit files
        shell: bash
        run: |
          set -euo pipefail
          cp \
            docs/legal/opennutrition/DERIVED_DATABASE_ODBL_NOTICE.md \
            "$PUBLIC_DIR/DERIVED_DATABASE_ODBL_NOTICE.md"
          cp \
            "$WORK_DIR/semantic-gate/semantic_gate_v5_summary.json" \
            "$PUBLIC_DIR/semantic_gate_summary.json"
          cp \
            "$WORK_DIR/semantic-gate/semantic_gate_v5_failures.json" \
            "$PUBLIC_DIR/semantic_gate_failures.json"
          if [[ -f "$WORK_DIR/extracted/LICENSE-ODbL.txt" ]]; then
            cp "$WORK_DIR/extracted/LICENSE-ODbL.txt" "$PUBLIC_DIR/"
          fi
          if [[ -f "$WORK_DIR/extracted/LICENSE-DbCL.txt" ]]; then
            cp "$WORK_DIR/extracted/LICENSE-DbCL.txt" "$PUBLIC_DIR/"
          fi

      - name: Verify published file limits
        shell: bash
        run: |
          set -euo pipefail
          file_count="$(find "$PUBLIC_DIR" -type f | wc -l | tr -d ' ')"
          max_bytes="$(
            find "$PUBLIC_DIR" -type f -printf '%s\n' \
              | sort -nr \
              | head -n1
          )"
          test "$file_count" -gt 0
          test "$file_count" -lt 20000
          test "$max_bytes" -gt 0
          test "$max_bytes" -lt 26214400
          echo "STATIC_FILE_COUNT=$file_count"
          echo "MAX_STATIC_FILE_BYTES=$max_bytes"

      - name: Upload validated static index
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: opennutrition-static-index-${{ env.DATASET_VERSION }}-${{ github.run_id }}
          path: ${{ env.PUBLIC_DIR }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Validate Cloudflare deployment configuration
        if: ${{ inputs.deploy }}
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_PAGES_PROJECT"

      - name: Deploy validated index to Cloudflare Pages
        if: ${{ inputs.deploy }}
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          set -euo pipefail
          npx --yes wrangler@4 pages deploy "$PUBLIC_DIR" \
            --project-name "$CLOUDFLARE_PAGES_PROJECT" \
            --branch main \
            --commit-dirty=true
