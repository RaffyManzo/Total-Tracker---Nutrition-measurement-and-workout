name: Flutter CI

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'feature/**'
  pull_request:
    branches:
      - main
      - 'release/**'
      - 'feature/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Dependencies
        run: flutter pub get
      - name: ObjectBox generation
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Localization generation
        run: flutter gen-l10n
      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyzer
        run: flutter analyze
      - name: Tests
        run: flutter test
      - name: Android debug build validation
        run: flutter build apk --debug --no-pub
