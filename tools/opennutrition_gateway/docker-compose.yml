services:
  gateway:
    build: .
    restart: unless-stopped
    init: true
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data/opennutrition.db:/data/opennutrition.db:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev,mode=1770
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    cpus: 1.0
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "python", "/app/app/healthcheck.py"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
