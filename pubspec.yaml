name: total_tracker
description: Total Tracker - Nutrition, measurement and workout.
publish_to: none

version: 0.1.0+19
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  excel2003: ^1.0.0
  flutter_riverpod: ^3.3.2
  archive: ^4.0.9
  crypto: ^3.0.7
  cryptography: ^2.9.0
  connectivity_plus: ^6.1.5
  url_launcher: ^6.3.2
  file_picker: ^10.3.3
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  http: ^1.6.0
  google_mlkit_translation: ^0.13.1
  json_annotation: ^4.12.0
  mobile_scanner: ^7.2.0
  objectbox: ^5.3.2
  objectbox_flutter_libs: ^5.3.2
  package_info_plus: ^8.3.1
  path: ^1.9.1
  path_provider: ^2.1.6
  uuid: ^4.5.3
  yaml: ^3.1.3
  flutter_local_notifications: ^19.5.0
  shared_preferences: ^2.5.5
  workmanager: ^0.9.0+3

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  objectbox_generator: ^5.3.2

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/data/
    - assets/dev_seed/
    - assets/icons/
    - assets/images/
